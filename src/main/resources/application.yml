# ══════════════════════════════════════════════════════════
# EMVAgent Backend - Application Configuration
# ══════════════════════════════════════════════════════════

spring:
  application:
    name: emvagent-backend

  # ── Database (Cloud SQL PostgreSQL on GCP) ──────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:emv_ai}
    username: ${DB_USER:emvagent}
    password: ${DB_PASS:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: emvagent-backend
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.emvagent.*"

  # ── Cache ───────────────────────────────────────────────
  cache:
    type: simple

  # ── Flyway DB Migrations ─────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

# ── Server ─────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api/v1

# ── JWT Security ────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:emvagent-super-secret-key-change-in-production}
  expiration-ms: 86400000  # 24 hours

# ── Python AI Microservice ──────────────────────────────────
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    timeout-seconds: 30
    retry-attempts: 3

# ── Google Cloud ────────────────────────────────────────────
gcp:
  project-id: ${GCP_PROJECT_ID:emvagent}
  bigquery:
    dataset: emv_payments
    feedback-table: feedback_approved
    transactions-table: transaction_features

# ── Kafka Topics ────────────────────────────────────────────
kafka:
  topics:
    chat-message: emv.chat.message
    feedback-raw: emv.feedback.raw
    feedback-approved: emv.feedback.approved
    diagnosis-request: emv.diagnosis.request
    diagnosis-result: emv.diagnosis.result

# ── Actuator ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ── Logging ─────────────────────────────────────────────────
logging:
  level:
    com.emvagent: DEBUG
    org.springframework.kafka: INFO
    org.springframework.security: INFO
